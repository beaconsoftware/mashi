name: Apply Supabase migrations

on:
  push:
    branches: [main]
  # Manual trigger so you can re-run from the Actions UI if something goes
  # sideways (e.g. a transient Supabase outage during the first attempt).
  workflow_dispatch:
  # NOTE: this workflow used to filter by `paths: supabase/migrations/**`
  # to skip code-only pushes. We removed that filter because Vercel
  # Deployment Checks require the check to ALWAYS report a status —
  # a skipped workflow never reports, so Vercel would wait forever and
  # never promote. `supabase db push` is idempotent; when there are no
  # new migrations it costs ~5 seconds.

# Don't run two migration jobs in parallel against the same DB. Queue
# them, with the latest superseding any in-progress run.
concurrency:
  group: supabase-migrations-prod
  cancel-in-progress: false

jobs:
  apply:
    name: Apply migrations to production Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # These two secrets must be set at:
    #   github.com/sidd-beacon/mashi/settings/secrets/actions
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: akpbzaivscqvaoapkdwd

    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify secrets are present
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret missing"
            exit 1
          fi
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::SUPABASE_DB_PASSWORD secret missing"
            exit 1
          fi

      - name: Link to project
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Push migrations (idempotent — only applies new ones)
        run: supabase db push

      - name: Reload PostgREST schema cache
        # PostgREST caches schema for ~10 min. Forcing a reload makes
        # any newly-added columns/tables available immediately so the
        # Vercel deploy that follows can use them without 'column not
        # found' errors during the first few minutes.
        run: |
          supabase db query --linked "NOTIFY pgrst, 'reload schema';"

      - name: Summary
        run: |
          echo "::notice::Migrations applied to project $PROJECT_REF"
          echo "::notice::Schema cache reloaded"
